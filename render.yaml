services:
  - type: web
    name: leader-book
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/main.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leader-book-db
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production

databases:
  - name: leader-book-db
    plan: free